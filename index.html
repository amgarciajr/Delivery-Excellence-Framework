<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Framework Library</title>
    <link href="css/styles.css" rel="stylesheet"/>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Check state immediately on load
            if (sessionStorage.getItem("ede-access") === "granted") {
                document.getElementById("access-gate").style.display = "none";
                document.getElementById("main-content").style.display = "block";
            }
        });

        function confirmProceed() {
            sessionStorage.setItem("ede-access", "granted");
            // Instead of reloading, just toggle visibility
            document.getElementById("access-gate").style.display = "none";
            document.getElementById("main-content").style.display = "block";
        }
    </script>
</head>
<body>
    <div id="access-gate">
        <h1>Restricted Access</h1>
        <p>This library is confidential.</p>
        <button onclick="confirmProceed()">Accept & Continue</button>
    </div>

    <div id="main-content" style="display:none;">
        <header>
            <div class="header-title"><span>EDE</span> / CEES / EEP Frameworks</div>
        </header>
        <div class="container">
            <div class="nav-grid">
                <a class="nav-item" href="modules/cees-playbook.html">CEES Playbook</a>
                <a class="nav-item" href="modules/eep-charter.html">EEP Charter</a>
                </div>
        </div>
    </div>
</body>
</html>
